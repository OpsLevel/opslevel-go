# https://taskfile.dev/

version: '3'

tasks:
  ci:
    desc: Workflow to run in CI
    cmds:
      - task: lint
      - task: test

  lint:
    desc: Formatting and linting
    cmds:
      - test -z "$(go tool gofumpt -d -e . | tee /dev/stderr)"
      - go tool golangci-lint run

  fix:
    desc: Fix formatting and linting
    cmds:
      - go tool gofumpt -w .
      - go mod tidy
      - go tool golangci-lint run --fix

  setup:
    desc: No-op; tools are managed via 'go tool' and go.mod

  test:
    desc: Run tests
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic -v ./... {{ .CLI_ARGS }}
      - grep -v "/enum.go" coverage.out > coverage.txt
    silent: true
